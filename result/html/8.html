<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>省电搜索</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Noto Sans SC', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 20px;
      color: #ffffff;
      letter-spacing: 2px;
    }
    .search-box {
      background-color: #1e1e1e;
      border-radius: 50px;
      padding: 6px 6px 6px 20px;
      display: flex;
      align-items: center;
      border: 1px solid #333;
      margin-bottom: 24px;
    }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #ffffff;
      font-size: 20px;
      padding: 12px 0;
      font-family: inherit;
    }
    .search-box input::placeholder {
      color: #888;
      font-size: 18px;
    }
    .voice-btn {
      background: #2a2a2a;
      border: none;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      margin-left: 8px;
      transition: background 0.1s;
    }
    .voice-btn:active {
      background: #3a3a3a;
    }
    .voice-btn svg {
      width: 28px;
      height: 28px;
      fill: #b0b0b0;
    }
    .map-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }
    .map-btn {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 18px 0;
      text-align: center;
      font-size: 22px;
      font-weight: 500;
      color: #e0e0e0;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      text-decoration: none;
      display: block;
    }
    .map-btn:active {
      background: #2a2a2a;
      border-color: #555;
    }
    .map-btn.meituan {
      border-left: 4px solid #ffc107;
    }
    .map-btn.baidu {
      border-left: 4px solid #4fc3f7;
    }
    .footer-note {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-top: 10px;
    }
    /* 没有任何动画、过渡、阴影，极致省电 */
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 搜一下</h1>
    <div class="search-box">
      <input type="text" placeholder="输入关键词..." aria-label="搜索框">
      <button class="voice-btn" aria-label="语音搜索" onclick="alert('语音识别已启动（模拟）')">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6.91 4c-.49 0-.9.36-.98.85C16.52 11.54 14.46 13 12 13s-4.52-1.46-4.93-3.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 2.47 2.59 4.36 5.14 4.78V17h-1.5c-.28 0-.5.22-.5.5s.22.5.5.5h4c.28 0 .5-.22.5-.5s-.22-.5-.5-.5H13v-2.08c2.55-.42 4.65-2.31 5.14-4.78.09-.6-.39-1.14-1-1.14z"/>
        </svg>
      </button>
    </div>
    <div class="map-buttons">
      <a class="map-btn meituan" href="https://www.meituan.com" target="_blank" rel="noopener noreferrer">美团地图</a>
      <a class="map-btn baidu" href="https://map.baidu.com" target="_blank" rel="noopener noreferrer">百度地图</a>
    </div>
    <div class="footer-note">
      深色省电 · 大按钮 · 无动画
    </div>
  </div>
</body>
</html>
